services:
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    container_name: fashion-mlflow
    ports:
      - "5001:5000"
    volumes:
      - ./mlflow:/mlflow
      - ./mlflow_artifacts:/mlflow/artifacts

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: fashion-api
    ports:
      - "8000:8000"
    volumes:
      - ./artifacts:/app/artifacts
    depends_on:
      - mlflow

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: fashion-frontend
    ports:
      - "8501:8501"
    environment:
      API_BASE_URL: http://api:8000
      TEST_CSV_PATH: /app/data/fashion_test.csv
    volumes:
      - ./data:/app/data
    depends_on:
      - api

  trainer:
    build:
      context: .
      dockerfile: Dockerfile.train
    container_name: fashion-trainer
    profiles:
      - train
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_NAME: fashion-mnist-experiment
      MODEL_NAME: fashion-mnist-random-forest
      REGISTER_MODEL: "true"
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
    depends_on:
      - mlflow
